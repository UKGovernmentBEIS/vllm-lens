<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jacobian lens · live J-space readout</title>
<style>
  :root { --ink:#111; --muted:#666; --line:#e6e6e3; --bg:#fcfcfb; --accent:#2a78d6; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  header { padding:16px 20px 8px; }
  h1 { font-size:18px; margin:0; }
  .subtitle { color:var(--muted); font-size:13px; margin:4px 0 0; }
  .controls { display:flex; align-items:center; gap:14px; padding:6px 20px; flex-wrap:wrap;
              font-size:13px; color:var(--muted); }
  .controls select, .controls button { font-size:13px; }
  button { padding:6px 12px; border:0; border-radius:6px; background:var(--accent); color:#fff;
           cursor:pointer; } button:disabled { opacity:.5; cursor:default; }
  #ctx { width:calc(100% - 40px); margin:4px 20px; min-height:64px; max-height:180px; resize:vertical;
         padding:10px; font-family:Menlo,Consolas,monospace; font-size:14px; line-height:1.5;
         border:1px solid var(--line); border-radius:8px; }
  #panel { padding:8px 20px 24px; overflow:auto; }
  .grid { display:flex; gap:2px; align-items:flex-start; }
  .col { display:flex; flex-direction:column; gap:2px; }
  .cell { width:86px; min-height:22px; padding:2px 5px; font-family:Menlo,Consolas,monospace;
          font-size:11px; line-height:1.3; border-radius:3px; overflow:hidden;
          text-overflow:ellipsis; white-space:nowrap; }
  .cell.head { background:transparent; color:var(--ink); font-weight:700;
               border-bottom:2px solid var(--line); border-radius:0; }
  #status { color:var(--muted); font-size:12px; }
  .hint { color:var(--muted); font-size:12px; padding:0 20px; }
</style>
</head>
<body>
  <header>
    <h1>Jacobian lens · live J-space readout</h1>
    <p class="subtitle">Type below — each column shows the top-k tokens the model is
      <em>disposed to say</em> at that position (residual transported through <code>J_l</code>,
      then unembedded). Updates as you type.</p>
  </header>

  <div class="controls">
    <span>layer</span><select id="layerSel"></select>
    <button id="contBtn" title="let the model extend the text">continue ▸</button>
    <label>+<input id="contN" type="number" value="20" min="1" max="128" style="width:52px"> tokens</label>
    <span id="status"></span>
  </div>

  <textarea id="ctx" spellcheck="false"></textarea>
  <div id="panel"><div class="hint" id="hint">…</div><div id="readout"></div></div>

<script>
// ── Injected by jacobian_lens_chat.py ──────────────────────────────
const BASE_URL = $BASE_URL;        // "" = same origin as this page
const MODEL = $MODEL;
const LAYERS = $LAYERS;
const TOPK = $TOPK;
const INITIAL_PROMPT = $INITIAL_PROMPT;

let lastReadout = null;            // { tokens:[...], layers:{ L:{toks,probs} } }
let reqSeq = 0;                    // guards against stale (out-of-order) responses

const layerSel = document.getElementById('layerSel');
LAYERS.forEach(L => { const o = document.createElement('option'); o.value = L;
  o.textContent = 'layer ' + L; layerSel.appendChild(o); });
layerSel.value = LAYERS[Math.floor(LAYERS.length / 2)] ?? LAYERS[0];
layerSel.onchange = renderReadout;

const ctx = document.getElementById('ctx');
ctx.value = INITIAL_PROMPT;

function probColor(p) {
  const t = Math.max(0, Math.min(1, p * 2.0));
  return `rgb(${Math.round(252-(252-42)*t)},${Math.round(252-(252-120)*t)},${Math.round(251-(251-214)*t)})`;
}
function showTok(s) {
  if (s === '' || s == null) return '·';
  if (s.trim() === '') return s.includes('\n') ? '⏎' : '␣';
  return s.replace(/\n/g, '⏎');
}

function parseLayers(saved) {
  const byPass = (prefix) => Object.keys(saved).filter(k => k.startsWith(prefix))
    .sort((a, b) => parseInt(a.split('_')[2]) - parseInt(b.split('_')[2]));
  const out = {};
  LAYERS.forEach(L => {
    let toks = [], probs = [];
    byPass(`t_${L}_`).forEach(k => { toks = toks.concat(saved[k]); });
    byPass(`p_${L}_`).forEach(k => { probs = probs.concat(saved[k]); });
    out[L] = { toks, probs };
  });
  return out;
}

function renderReadout() {
  const box = document.getElementById('readout');
  box.innerHTML = '';
  if (!lastReadout) return;
  const data = lastReadout.layers[parseInt(layerSel.value)];
  const tokens = lastReadout.tokens;
  if (!data || !data.toks.length) { box.textContent = 'no readout for this layer'; return; }
  const n = Math.min(tokens.length, data.toks.length);
  const grid = document.createElement('div'); grid.className = 'grid';
  for (let c = 0; c < n; c++) {
    const col = document.createElement('div'); col.className = 'col';
    const head = document.createElement('div'); head.className = 'cell head';
    head.textContent = showTok(tokens[c]); head.title = JSON.stringify(tokens[c]);
    col.appendChild(head);
    const trow = data.toks[c] || [], prow = data.probs[c] || [];
    for (let r = 0; r < TOPK; r++) {
      const cell = document.createElement('div'); cell.className = 'cell';
      const w = trow[r] ?? '', p = prow[r] ?? 0;
      cell.textContent = showTok(w);
      cell.style.background = probColor(p);
      cell.style.color = p > 0.35 ? '#fff' : '#111';
      cell.title = JSON.stringify(w) + '  p=' + Number(p).toFixed(3);
      col.appendChild(cell);
    }
    grid.appendChild(col);
  }
  box.appendChild(grid);
}

// One tiny 1-token echo request; the server-registered hook runs over the text,
// and we pull its result from /v1/hooks/collect (correlated by X-Request-Id).
async function readout() {
  const text = ctx.value;
  const seq = ++reqSeq;
  const hint = document.getElementById('hint'), status = document.getElementById('status');
  if (!text.trim()) { lastReadout = null; document.getElementById('readout').innerHTML = '';
                      hint.textContent = 'type something…'; return; }
  status.textContent = 'reading…';
  const rid = 'jl-' + Math.random().toString(36).slice(2);
  try {
    const resp = await fetch(BASE_URL + '/v1/completions', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Request-Id': rid },
      body: JSON.stringify({ model: MODEL, prompt: text, max_tokens: 1, echo: true,
                             logprobs: 1, temperature: 0 })
    });
    const d = await resp.json();
    if (seq !== reqSeq) return;                       // a newer keystroke superseded us
    const tokens = d.choices?.[0]?.logprobs?.tokens || [];
    const c = await fetch(BASE_URL + '/v1/hooks/collect', { method: 'POST' });
    const res = (await c.json()).results || {};
    if (seq !== reqSeq) return;
    const key = Object.keys(res).find(k => k.includes(rid));
    if (!key) { status.textContent = ''; hint.textContent = '(no readout returned)'; return; }
    lastReadout = { tokens, layers: parseLayers(res[key]['0']) };
    hint.textContent = ''; status.textContent = '';
    renderReadout();
  } catch (e) { if (seq === reqSeq) status.textContent = 'error: ' + e; }
}

let debounce = null;
ctx.addEventListener('input', () => { clearTimeout(debounce); debounce = setTimeout(readout, 350); });

document.getElementById('contBtn').onclick = async () => {
  const btn = document.getElementById('contBtn'); btn.disabled = true;
  const status = document.getElementById('status'); status.textContent = 'generating…';
  const nTok = parseInt(document.getElementById('contN').value) || 20;
  try {
    const resp = await fetch(BASE_URL + '/v1/completions', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: MODEL, prompt: ctx.value, max_tokens: nTok, temperature: 0.7 })
    });
    const d = await resp.json();
    ctx.value += (d.choices?.[0]?.text || '');
  } catch (e) { status.textContent = 'error: ' + e; }
  btn.disabled = false;
  readout();
};

readout();  // initial
</script>
</body>
</html>
