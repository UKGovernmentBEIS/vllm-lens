# FSDP config for the Jacobian fitter (examples/fit_jacobian_fsdp.py).
# Mirrors the mt-finetuning scaffolding: FULL_SHARD + transformer wrap +
# CPU-RAM-efficient loading (only rank 0 materializes weights, others load on
# meta and receive them via sync_module_states) so we can shard a model too big
# for one GPU across all ranks / both nodes.
#
# Single node:  accelerate launch --config_file <this> --num_processes 8 examples/fit_jacobian_fsdp.py ...
# Two nodes:    on each node, accelerate launch --config_file <this> \
#                 --num_machines 2 --machine_rank $NODE_RANK \
#                 --main_process_ip $HEAD_IP --num_processes 16 examples/fit_jacobian_fsdp.py ...
compute_environment: LOCAL_MACHINE
debug: false
distributed_type: FSDP
downcast_bf16: 'no'
enable_cpu_affinity: false
fsdp_config:
  fsdp_activation_checkpointing: false
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP
  fsdp_backward_prefetch: BACKWARD_PRE
  fsdp_cpu_ram_efficient_loading: true
  fsdp_forward_prefetch: true
  fsdp_offload_params: false
  fsdp_sharding_strategy: FULL_SHARD
  fsdp_state_dict_type: SHARDED_STATE_DICT
  fsdp_sync_module_states: true
  fsdp_use_orig_params: true
machine_rank: 0
main_training_function: main
mixed_precision: 'no'
num_machines: 1
num_processes: 8
rdzv_backend: static
same_network: true
use_cpu: false
