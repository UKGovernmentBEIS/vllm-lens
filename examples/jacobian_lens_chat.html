<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jacobian lens · live J-space chat</title>
<style>
  :root { --ink:#111; --muted:#666; --line:#e6e6e3; --bg:#fcfcfb; --accent:#2a78d6; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  header { padding:14px 20px 4px; }
  h1 { font-size:18px; margin:0; }
  .subtitle { color:var(--muted); font-size:13px; margin:3px 0 0; }
  .controls { display:flex; align-items:center; gap:16px; padding:6px 20px; flex-wrap:wrap;
              font-size:13px; color:var(--muted); }
  .controls input[type=number] { font-size:13px; }
  button { padding:7px 13px; border:0; border-radius:6px; background:var(--accent); color:#fff;
           cursor:pointer; font-size:14px; } button:disabled { opacity:.5; cursor:default; }
  button.mini { padding:1px 6px; font-size:11px; background:#eee; color:#333; }
  #chat { padding:6px 20px; }
  .turn { margin:12px 0; border-left:3px solid var(--line); padding-left:10px; }
  .turn.user { border-color:#9db8d6; }
  .turn.assistant { border-color:#cdd6cd; }
  .turn .hd { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--muted);
              text-transform:uppercase; letter-spacing:.05em; margin-bottom:3px; }
  .turn .body { font-family:Menlo,Consolas,monospace; font-size:13.5px; line-height:1.7;
                white-space:pre-wrap; }
  .tok { border-radius:3px; padding:0 1px; cursor:default; }
  .tok.ready { cursor:pointer; }
  .tok.ready:hover, .tok.pinned { outline:2px solid var(--accent); outline-offset:0; }
  .turn .editrow textarea { width:100%; min-height:60px; font-family:Menlo,Consolas,monospace;
                            font-size:13px; padding:6px; border:1px solid var(--line); border-radius:6px; }
  .inputrow { display:flex; gap:8px; padding:8px 20px; align-items:flex-end; }
  #inp { flex:1; min-height:42px; max-height:150px; resize:vertical; padding:9px;
         font-family:Menlo,Consolas,monospace; font-size:14px; border:1px solid var(--line);
         border-radius:8px; }
  #status { color:var(--muted); font-size:12px; }
  /* readout grid (used by hover tooltip + pinned panel) */
  .rd { display:flex; gap:6px; }
  .rd .lyr { display:flex; flex-direction:column; gap:2px; }
  .rd .lh { font-size:10px; color:var(--muted); text-align:center; }
  .rd .c { width:80px; padding:1px 4px; font-family:Menlo,Consolas,monospace; font-size:10.5px;
           border-radius:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #tip { position:fixed; z-index:20; background:#fff; border:1px solid var(--line); border-radius:8px;
         box-shadow:0 6px 24px rgba(0,0,0,.12); padding:8px; display:none; }
  #tip .cap, #pin .cap { font-size:11px; color:var(--muted); margin-bottom:4px; }
  #pin { position:sticky; bottom:0; background:var(--bg); border-top:1px solid var(--line);
         padding:8px 20px; min-height:20px; }
</style>
</head>
<body>
  <header>
    <h1>Jacobian lens · live J-space chat</h1>
    <p class="subtitle">Chat, and hover any token to see the top-k it's <em>disposed to say</em>
      there (residual transported through <code>J_l</code>, then unembedded). Readout streams in
      as the reply generates; click a token to pin it.</p>
  </header>

  <div class="controls">
    <label>top-<input id="kSel" type="number" value="6" min="1" style="width:52px"></label>
    <label>response <input id="maxTok" type="number" value="512" min="1" max="2048" style="width:64px"> tokens</label>
    <label><input id="thinkChk" type="checkbox" checked> thinking</label>
    <span id="status"></span>
  </div>

  <div id="chat"></div>

  <div class="inputrow">
    <textarea id="inp" spellcheck="false"
      placeholder="Type a message, then Send (or Enter). Shift+Enter for newline."></textarea>
    <button id="sendBtn">Send ▸</button>
  </div>

  <div id="pin"><span class="cap">click a token to pin its readout here</span></div>
  <div id="tip"></div>

<script>
// ── Injected by jacobian_lens_chat.py ──────────────────────────────
const BASE_URL = $BASE_URL;        // local forwarded port, or "" for same origin
const MODEL = $MODEL;
const LAYERS = $LAYERS;            // captured layers (shown across the tooltip)
const MAXK = $TOPK;                // top-k captured by the registered hook
const INITIAL_PROMPT = $INITIAL_PROMPT;

const turns = [];                  // [{role, content, tokens:[str], readout:{L:{toks,probs}}, streaming}]
let pinned = null;                 // {turn, idx}

const kSel = document.getElementById('kSel');
kSel.max = MAXK; if (parseInt(kSel.value) > MAXK) kSel.value = MAXK;
kSel.oninput = () => { if (pinned) renderInto(document.getElementById('pin'), pinned.turn, pinned.idx, true); };
const inp = document.getElementById('inp');
inp.value = INITIAL_PROMPT;

function probColor(p) {
  const t = Math.max(0, Math.min(1, p * 2.0));
  return `rgb(${Math.round(252-(252-42)*t)},${Math.round(252-(252-120)*t)},${Math.round(251-(251-214)*t)})`;
}
function showTok(s) {
  if (s === '' || s == null) return '·';
  if (s.trim() === '') return s.includes('\n') ? '⏎' : '␣';
  return s.replace(/\n/g, '⏎');
}

// Build {L:{toks,probs}} aligned to the LAST `nTok` readout positions.
function buildReadout(saved, nTok) {
  const byPass = (p) => Object.keys(saved).filter(k => k.startsWith(p))
    .sort((a, b) => parseInt(a.split('_')[2]) - parseInt(b.split('_')[2]));
  const out = {};
  LAYERS.forEach(L => {
    let toks = [], probs = [];
    byPass(`t_${L}_`).forEach(k => { toks = toks.concat(saved[k]); });
    byPass(`p_${L}_`).forEach(k => { probs = probs.concat(saved[k]); });
    const off = Math.max(0, toks.length - nTok);
    out[L] = { toks: toks.slice(off), probs: probs.slice(off) };
  });
  return out;
}

// Time-bounded so a slow/large fetch can't hang the turn forever; null on failure.
async function collect(rid, ms = 8000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  try {
    const c = await fetch(BASE_URL + '/v1/hooks/collect', { method: 'POST', signal: ctrl.signal });
    const res = (await c.json()).results || {};
    const key = Object.keys(res).find(k => k.includes(rid));
    return key ? res[key]['0'] : null;
  } catch (e) { return null; } finally { clearTimeout(timer); }
}

// Drop accumulated results on the server (keeps the hook registered) so that
// /collect only ever returns the current turn and stays small.
async function clearResults() {
  try { await fetch(BASE_URL + '/v1/hooks/clear_results', { method: 'POST' }); } catch (e) {}
}

// Render the layers × top-K grid for turn.tokens[idx] into `el`.
function renderInto(el, turn, idx, withCap) {
  el.innerHTML = '';
  const K = Math.max(1, Math.min(MAXK, parseInt(kSel.value) || 6));
  if (withCap) { const cap = document.createElement('div'); cap.className = 'cap';
    cap.textContent = 'token ' + JSON.stringify(turn.tokens[idx]); el.appendChild(cap); }
  const rd = document.createElement('div'); rd.className = 'rd';
  LAYERS.forEach(L => {
    const lyr = document.createElement('div'); lyr.className = 'lyr';
    const lh = document.createElement('div'); lh.className = 'lh'; lh.textContent = 'L' + L;
    lyr.appendChild(lh);
    const d = turn.readout?.[L]; const trow = d?.toks[idx] || [], prow = d?.probs[idx] || [];
    for (let r = 0; r < K; r++) {
      const c = document.createElement('div'); c.className = 'c';
      const w = trow[r] ?? '', p = prow[r] ?? 0;
      c.textContent = showTok(w); c.style.background = probColor(p);
      c.style.color = p > 0.35 ? '#fff' : '#111';
      c.title = JSON.stringify(w) + '  p=' + Number(p).toFixed(3);
      lyr.appendChild(c);
    }
    rd.appendChild(lyr);
  });
  el.appendChild(rd);
}

const tip = document.getElementById('tip');
function showTip(e, turn, idx) {
  renderInto(tip, turn, idx, true); tip.style.display = 'block';
  const r = 14; tip.style.left = Math.min(e.clientX + r, innerWidth - tip.offsetWidth - 8) + 'px';
  tip.style.top = Math.min(e.clientY + r, innerHeight - tip.offsetHeight - 8) + 'px';
}
function hideTip() { tip.style.display = 'none'; }

function hasReadout(turn, idx) {
  return !!(turn.readout && turn.readout[LAYERS[0]] && turn.readout[LAYERS[0]].toks[idx]);
}

// Incrementally sync a turn's token spans into bodyEl: append spans for newly
// arrived tokens only (never rebuild existing ones, so hover handlers stay put
// and the span under the cursor isn't destroyed mid-stream), then refresh each
// span's "ready" state as readouts arrive. Plain text until tokens exist.
function syncBody(turn, bodyEl) {
  const toks = turn.tokens || [];
  if (!toks.length) { bodyEl.textContent = turn.content; bodyEl._n = 0; return; }
  if (bodyEl._n === undefined || (bodyEl.firstChild && bodyEl.firstChild.nodeType === 3)) {
    bodyEl.innerHTML = ''; bodyEl._n = 0;   // was plain text → switch to spans
  }
  for (let i = bodyEl._n; i < toks.length; i++) {
    const idx = i;
    const sp = document.createElement('span'); sp.className = 'tok'; sp.textContent = toks[i];
    sp.onmousemove = (e) => showTip(e, turn, idx);
    sp.onmouseleave = hideTip;
    sp.onclick = () => { if (!hasReadout(turn, idx)) return;
      pinned = { turn, idx };
      renderInto(document.getElementById('pin'), turn, idx, true);
      document.querySelectorAll('.tok.pinned').forEach(x => x.classList.remove('pinned'));
      sp.classList.add('pinned'); };
    bodyEl.appendChild(sp);
  }
  bodyEl._n = toks.length;
  const spans = bodyEl.childNodes;
  for (let i = 0; i < spans.length && i < toks.length; i++)
    spans[i].classList.toggle('ready', hasReadout(turn, i));
}

function renderChat() {
  const chat = document.getElementById('chat'); chat.innerHTML = '';
  turns.forEach((turn, ti) => {
    const d = document.createElement('div'); d.className = 'turn ' + turn.role;
    const hd = document.createElement('div'); hd.className = 'hd';
    hd.innerHTML = `<span>${turn.role === 'user' ? 'You' : 'Assistant'}</span>`;
    const edit = document.createElement('button'); edit.className = 'mini'; edit.textContent = 'edit';
    const del = document.createElement('button'); del.className = 'mini'; del.textContent = 'delete';
    hd.append(edit, del);
    const body = document.createElement('div'); body.className = 'body';
    syncBody(turn, body);
    d.append(hd, body); chat.appendChild(d);
    del.onclick = () => { turns.splice(ti, 1); if (pinned && pinned.turn === turn) pinned = null; renderChat(); };
    edit.onclick = () => beginEdit(turn, d, body);
  });
  chat.scrollTop = 1e9;
}

function beginEdit(turn, turnEl, bodyEl) {
  const wrap = document.createElement('div'); wrap.className = 'editrow';
  const ta = document.createElement('textarea'); ta.value = turn.content;
  const save = document.createElement('button'); save.className = 'mini'; save.textContent = 'save';
  const cancel = document.createElement('button'); cancel.className = 'mini'; cancel.textContent = 'cancel';
  wrap.append(ta, document.createElement('br'), save, cancel);
  bodyEl.replaceWith(wrap);
  cancel.onclick = renderChat;
  save.onclick = async () => { turn.content = ta.value; turn.tokens = null; turn.readout = null;
    renderChat(); await clearResults(); await echoReadout(turn); };
}

// Readout over a turn's raw text (used for user + edited turns). Clean per-token labels.
async function echoReadout(turn) {
  if (!turn.content.trim()) return;
  const rid = 'jl-' + Math.random().toString(36).slice(2);
  const resp = await fetch(BASE_URL + '/v1/completions', {
    method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Request-Id': rid },
    body: JSON.stringify({ model: MODEL, prompt: turn.content, max_tokens: 1, echo: true,
                           logprobs: 1, temperature: 0 })
  });
  const d = await resp.json();
  turn.tokens = d.choices?.[0]?.logprobs?.tokens || [];
  const saved = await collect(rid);
  if (saved) turn.readout = buildReadout(saved, turn.tokens.length);
  renderChat();
}

// Stream the assistant reply; poll /collect during generation so the readout
// streams onto the tokens as they arrive.
async function createResponse() {
  const text = inp.value.trim(); if (!text) return;
  const btn = document.getElementById('sendBtn'), status = document.getElementById('status');
  btn.disabled = true; status.textContent = 'generating…'; inp.value = '';

  await clearResults();  // start this turn from an empty result set → /collect stays small

  const userTurn = { role: 'user', content: text }; turns.push(userTurn);
  const asst = { role: 'assistant', content: '', tokens: [], readout: {}, streaming: true };
  turns.push(asst); renderChat();
  echoReadout(userTurn);  // fill the user message's hover readout in the background

  const rid = 'jl-' + Math.random().toString(36).slice(2);
  const history = turns.filter(t => !t.streaming).map(t => ({ role: t.role, content: t.content }));

  // Poll for the streaming readout with only ONE request in flight at a time: the
  // next poll starts only after the previous returns, so polls can't stack up and
  // saturate the connection pool (which is what stalled the SSE stream before).
  let polling = true;
  (async function pollLoop() {
    while (polling) {
      const saved = await collect(rid);
      if (saved && asst.tokens.length) { asst.readout = buildReadout(saved, asst.tokens.length); refreshAsst(asst); }
      if (!polling) break;
      await new Promise(r => setTimeout(r, 500));
    }
  })();

  try {
    const resp = await fetch(BASE_URL + '/v1/chat/completions', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Request-Id': rid },
      body: JSON.stringify({ model: MODEL, messages: history,
        max_tokens: parseInt(document.getElementById('maxTok').value) || 512, temperature: 0.7,
        stream: true, logprobs: true, top_logprobs: 1,
        chat_template_kwargs: { enable_thinking: document.getElementById('thinkChk').checked } })
    });
    const reader = resp.body.getReader(); const dec = new TextDecoder(); let buf = '';
    while (true) {
      const { done, value } = await reader.read(); if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ') || line === 'data: [DONE]') continue;
        let ch; try { ch = JSON.parse(line.slice(6)); } catch (e) { continue; }
        const delta = ch.choices?.[0]?.delta?.content;
        if (delta) asst.content += delta;
        const lp = ch.choices?.[0]?.logprobs?.content;
        if (lp) lp.forEach(t => asst.tokens.push(t.token));
        refreshAsst(asst);
      }
    }
  } catch (e) { status.textContent = 'error: ' + e; }
  polling = false;
  // One final collect for any tail positions; keep the last good readout if it fails
  // (so a slow final fetch never loses the readout the polls already streamed in).
  const saved = await collect(rid);
  if (saved) asst.readout = buildReadout(saved, asst.tokens.length);
  asst.streaming = false; refreshAsst(asst);
  status.textContent = ''; btn.disabled = false;
}

// Re-render just the assistant turn's body in place (during streaming).
function refreshAsst(asst) {
  const ti = turns.indexOf(asst); if (ti < 0) return;
  const body = document.querySelectorAll('#chat .turn')[ti]?.querySelector('.body');
  if (body) syncBody(asst, body);
}

document.getElementById('sendBtn').onclick = createResponse;
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); createResponse(); }
});
</script>
</body>
</html>
